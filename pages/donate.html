<div class="donate-wrapper">
    <!-- 标题区 -->
    <h2 class="donate-title">☕ 请作者喝杯咖啡</h2>
    <div class="donate-desc">
        如果我的开源项目或技术分享对您有所帮助，<br>
        欢迎请我喝杯咖啡！您的支持是我持续创作高质量内容的最大动力。<br>
    </div>

    <!-- 二维码展示区 -->
    <div class="qr-grid">
        
        <!-- 微信支付卡片 -->
        <div class="qr-card wechat-card">
            <div class="qr-image-box">

                <img src="./images/pay/wechatpay.png" alt="WeChat Pay QR Code">
            </div>
            <div class="platform-name wechat-text">
                <span>WeChat</span>
            </div>
            <div class="platform-sub">微信支付 · 俯首</div>
        </div>

        <!-- 支付宝卡片 -->
        <div class="qr-card alipay-card">
            <div class="qr-image-box">
                <!-- 
                   【使用说明】：
                   1. 将您的支付宝收款码图片保存到 images 文件夹。
                   2. 取消下面 img 标签的注释。
                   3. 删除 div.placeholder-text 行。
                -->
                <img src="./images/pay/alipay.png" alt="Alipay QR Code">
                
                <!-- <div class="placeholder-text">
                    <span class="placeholder-icon" style="color:#1677ff">💳</span>
                    支付宝扫码<br>请替换图片
                </div> -->
            </div>
            <div class="platform-name alipay-text">
                <span>Alipay</span>
            </div>
            <div class="platform-sub">支付宝 · 鞠躬</div>
        </div>

    </div>

    <!-- 致谢名单 (可选) -->
    <div class="thanks-section">
        <div class="thanks-title">
            <span>🏆</span> 感谢以下赞助者
        </div>
        <div class="thanks-list">           
            <span class="thanks-tag">RustEvangelist</span>
            <span class="thanks-tag">听风吟</span>
            <span class="thanks-tag">DevOps_Ninja</span> 
            <span class="thanks-tag">星河滚烫</span>
            <span class="thanks-tag">SudoUser</span>
            <span class="thanks-tag">墨染青衣</span>
            <span class="thanks-tag">PythonicLife</span>
            <span class="thanks-tag">一只特立独行的猪</span>
            <span class="thanks-tag">GitPushForce</span>
            <span class="thanks-tag">云深不知处</span>
            <span class="thanks-tag">CloudArchitect</span>
            <span class="thanks-tag">半糖去冰</span>
            <span class="thanks-tag">ByteMeister</span>
        </div>
        <p style="margin-top: 15px; font-size: 0.85rem; color: #9ca3af;">
            * 所有捐赠将用于服务器维护、域名续费及更多技术分析
        </p>
